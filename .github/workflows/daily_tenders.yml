name: ICT Tender Scraper (manual only — VPS runs hourly)

# Schedule disabled: scraper now runs hourly on VPS via cron.
# Keep workflow_dispatch for emergency manual runs from GitHub UI.
on:
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run tender scraper
        env:
          EGP_USERNAME: ${{ secrets.EGP_USERNAME }}
          EGP_PASSWORD: ${{ secrets.EGP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tender_scraper.py

      - name: Save CSV back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ict_tenders_*.csv || true
          git diff --staged --quiet || git commit -m "chore: save CSV $(date +'%Y-%m-%d')"
          git push
